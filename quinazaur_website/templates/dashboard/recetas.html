<section class="recetas">
    <h2 class="titulo-datos">Hasta el momento, se han agregado {{datos[3]}} recetas en la plataforma.</h2>
    <div class="container-datos">
        {% for receta in datos[2] %}
        <div class="card">
            <img class="foto" src="{{url_for('static', filename='/images/receta.svg')}}" alt="icon">
            <div class="datos">
                <h3>{{receta.nombre_receta}}</h3>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
